<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Migrar ativos.json para Firestore</title>
  <!-- Versão compatível (v8) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>
<h1>Migração de Ativos para novo formato</h1>
  <button onclick="migrarAtivos()">Migrar agora</button>

  <script>
    // 🔹 Configuração do Firebase (copie do Console → Configurações do projeto → Suas apps → Web)
const firebaseConfig = {
  apiKey: "AIzaSyDKthFo4SkRxAteYdrRMc4h6HFom6XOZa0",
  authDomain: "consultadeativos.firebaseapp.com",
  projectId: "consultadeativos",
  storageBucket: "consultadeativos.appspot.com", // corrigido
  messagingSenderId: "493340773129",
  appId: "1:493340773129:web:5c42e99c95da7e1f29a1d8",
  measurementId: "G-4PSGVH17RY"
};

firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function migrarAtivos() {
      const snapshot = await db.collection("ativos").get();

      for (const doc of snapshot.docs) {
        const dados = doc.data();

        const novoAtivo = {
          nome: dados["Nome de Ativos"] || dados.nome || doc.id,
          sinonimos: [],
          classe: dados["Classe Terapeutica"] || dados.classe || "",
          indicacao: dados["Indicação"] || dados.indicacao || "",
          mecanismo: dados["Mecanismo de Ação"] || dados.mecanismo || "",
          formas: dados["Formas Farmacêuticas"] || dados.formas || "",
          observacoes: dados["Observações"] || dados.observacoes || ""
        };

        // Converter sinônimos (string → array)
        if (dados["Sinonimos"]) {
          if (Array.isArray(dados["Sinonimos"])) {
            novoAtivo.sinonimos = dados["Sinonimos"];
          } else {
            novoAtivo.sinonimos = dados["Sinonimos"]
              .split(",")
              .map(s => s.trim())
              .filter(s => s);
          }
        }

        // Salvar no Firestore com o novo formato
        await db.collection("ativos").doc(novoAtivo.nome).set(novoAtivo);
        console.log(`Migrado: ${novoAtivo.nome}`);
      }

      alert("Migração concluída!");
    }
  </script>
</body>
</html>
